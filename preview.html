    document.getElementById("timer").innerHTML =
    "<div class='box'>"+d+"<br>Gün</div>" +
    "<div class='box'>"+h+"<br>Saat</div>" +
    "<div class='box'>"+m+"<br>Dakika</div>" +
    "<div class='box'>"+s+"<br>Saniye</div>";
},1000);
</script>

</body>
